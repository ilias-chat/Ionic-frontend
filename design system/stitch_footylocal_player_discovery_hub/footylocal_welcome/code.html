<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FootyLocal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

          darkMode: "class",

                      "inverse-surface": "#dae2fd",
                      "primary": "#4be277",

                      "on-primary-fixed-variant": "#005321",
                      "on-secondary-fixed-variant": "#5a4300",
                      "on-error": "#690005",
                      "surface": "#0b1326",
                      "secondary-container": "#e4ae00",
                      "primary-container": "#22c55e",
                      "surface-container-highest": "#2d3449",
                      "secondary-fixed-dim": "#f7be1d",
                      "surface-bright": "#31394d",
                      "on-secondary-container": "#5b4400",
                      "on-primary": "#003915",
                      "secondary": "#ffca45",
                      "surface-variant": "#2d3449",
                      "on-secondary-fixed": "#251a00",
                      "secondary-fixed": "#ffdf9a",
                      "on-surface": "#dae2fd",
                      "on-tertiary": "#00354a",
                      "on-tertiary-fixed": "#001e2c",
                      "inverse-on-surface": "#283044",
                      "on-background": "#dae2fd",
                      "tertiary-container": "#2eb7f2",

                      "outline": "#869585",

                      "on-surface-variant": "#bccbb9",
                      "on-primary-fixed": "#002109",
                      "tertiary": "#7cd0ff",
                      "tertiary-fixed-dim": "#7bd0ff",
                      "surface-tint": "#4ae176",
                      "surface-container-lowest": "#060e20",
                      "error-container": "#93000a",
                      "surface-dim": "#0b1326",
                      "tertiary-fixed": "#c4e7ff",
                      "inverse-primary": "#006e2f",
                      "background": "#0b1326",
                      "on-secondary": "#3f2e00",
                      "surface-container-high": "#222a3d",
                      "primary-fixed": "#6bff8f",
                      "on-tertiary-container": "#00455f"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "1.25rem",
                      "stack-md": "1rem",
                      "stack-lg": "2rem",
                      "unit": "4px",
                      "gutter": "1rem",
                      "stack-sm": "0.5rem"
              },
              "fontFamily": {
                      "label-sm": ["JetBrains Mono"],
                      "body-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"],
                      "title-lg": ["Inter"],
                      "display-lg": ["Inter"]
              },
              "fontSize": {
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pitch-gradient {
            background: linear-gradient(180deg, rgba(11, 19, 38, 0.4) 0%, rgba(11, 19, 38, 0.8) 50%, #0b1326 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- Full Page Hero Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAA14sq-V1uq8-kZPbZ63m0gCH0Nxy4lzSTmYy6xj40Yr_E6aI2DGCYnj8sMCSYdemBpi5gEGsuOBQtrOSyFnUTpc8e9bN5mDTtm1TwO3yLMQWqBFLzbw-Rvh_5qWbAJYIMSN_ZmKrbLsJrYldiFV2YhDY1Xj6jJNU--4KWZ_vmgIXsyQHyVKHmzWh-WQy3qD4NeHTRzl1t1w-x0nbfziQw2T5pGABvnT1ywM-96-6Yf2c2D5MhNDVCxlAqJcPLQDTjhz5Bs8Pvdw')"></div>
<div class="absolute inset-0 pitch-gradient"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex min-h-screen items-center justify-center px-container-padding">
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Branding -->
<div class="mb-stack-lg text-center">
<span class="material-symbols-outlined text-primary text-[48px] mb-2" data-icon="sports_soccer">sports_soccer</span>
<h1 class="font-display-lg text-title-lg font-black tracking-tighter text-primary uppercase">FootyLocal</h1>
<p class="font-body-md text-on-surface-variant mt-1">The game starts here.</p>
</div>
<!-- Login Card -->
<div class="glass-panel w-full rounded-xl p-8 shadow-2xl">
<form class="space-y-gutter">
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md" id="email" placeholder="name@email.com" type="email"/>
</div>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary font-title-lg py-4 rounded-xl font-bold active:scale-[0.98] transition-transform shadow-lg shadow-primary/20" type="submit">
                        Login
                    </button>
</form>
<div class="mt-stack-lg flex flex-col items-center gap-stack-md">
<p class="font-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Sign Up</a>
</p>
<div class="w-full flex items-center gap-stack-sm my-2">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant/50">OR</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<button class="w-full border border-secondary text-secondary font-title-lg py-3 rounded-xl font-semibold hover:bg-secondary/5 active:scale-[0.98] transition-all">
                        Continue as Guest
                    </button>
</div>
</div>
<!-- Footer Legal -->
<div class="mt-stack-lg text-center opacity-40">
<p class="font-label-sm text-label-sm">By continuing, you agree to our Terms &amp; Privacy Policy</p>
</div>
</div>
</main>
<!-- Visual Polish: Field Glare -->
<div class="fixed top-0 left-0 w-full h-1/2 pointer-events-none bg-gradient-to-b from-primary/5 to-transparent"></div>
</body></html>
