<ion-header class="fl-app-header">
  <ion-toolbar>
    <div class="header-start" slot="start">
      @if (showBack) {
        <ion-button fill="clear" class="icon-btn" [routerLink]="backHref">
          <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
        </ion-button>
      }
      @if (layout === 'brand') {
        <div class="brand">
          <ion-icon name="football-outline" class="brand-icon"></ion-icon>
          <span class="brand-title">{{ title }}</span>
        </div>
      } @else {
        <div class="title-row">
          <ion-icon name="football-outline" class="title-icon"></ion-icon>
          <h1 class="page-title">{{ title }}</h1>
        </div>
      }
    </div>

    <div class="header-end" slot="end">
      @if (showNotifications) {
        <ion-button fill="clear" class="icon-btn" aria-label="Notifications">
          <ion-icon slot="icon-only" name="notifications-outline"></ion-icon>
        </ion-button>
      }
      @if (showSearch) {
        <ion-button fill="clear" class="icon-btn search-btn" aria-label="Search" (click)="goDiscovery()">
          <ion-icon slot="icon-only" name="search-outline"></ion-icon>
        </ion-button>
      }
      @if (showShareActions) {
        <ion-button fill="clear" class="icon-btn" aria-label="Share">
          <ion-icon slot="icon-only" name="share-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" class="icon-btn" aria-label="More">
          <ion-icon slot="icon-only" name="ellipsis-vertical-outline"></ion-icon>
        </ion-button>
      }
      @if (showAvatar) {
        <a class="avatar-link" routerLink="/tabs/profile" aria-label="Profile">
          <app-user-avatar
            size="sm"
            [photoUrl]="photoUrl()"
            [name]="displayName()"
            [email]="displayEmail()"
            [useIconFallback]="isGuest() || !photoUrl()"
          />
        </a>
      }
    </div>
  </ion-toolbar>
</ion-header>
