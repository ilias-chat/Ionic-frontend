<app-shell-header layout="brand" [showSearch]="true" />

<ion-content scroll-y="false" class="map-page">
  <div #mapHost class="leaflet-host"></div>
  @if (loading()) {
    <div class="map-overlay">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  }
  @if (error()) {
    <p class="map-error">{{ error() }}</p>
  }
</ion-content>
